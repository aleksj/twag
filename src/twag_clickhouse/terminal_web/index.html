<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TWAG Terminal</title>
    <link rel="stylesheet" href="__TWAG_TERMINAL_STYLES_URL__">
  </head>
  <body>
    <main class="shell" data-state="booting">
      <header class="topbar">
        <div>
          <p class="eyebrow">operator console</p>
          <h1>TWAG Terminal</h1>
        </div>
        <div class="meta">
          <span id="connectionState">booting</span>
          <span id="backendState" data-health="unknown">services: --</span>
          <span id="cityState">city: --</span>
        </div>
      </header>

      <section class="workspace" aria-label="TWAG terminal">
        <aside class="status-panel" aria-label="Status">
          <div class="panel-title">status</div>
          <pre id="statusText">Starting session...</pre>
          <div class="panel-title">commands</div>
          <div class="command-grid">
            <div class="city-switch" role="group" aria-label="City">
              <button type="button" data-city="nyc" aria-pressed="false">NYC</button>
              <button type="button" data-city="boston" aria-pressed="false">Boston</button>
            </div>
            <div class="verbosity-switch" role="group" aria-label="Output detail">
              <button type="button" data-mode="quiet" aria-pressed="true">Quiet</button>
              <button type="button" data-mode="verbose" aria-pressed="false">Verbose</button>
            </div>
            <div class="thinking-switch" role="group" aria-label="Model thinking">
              <button type="button" data-thinking="off" aria-pressed="true">No thinking</button>
              <button type="button" data-thinking="on" aria-pressed="false">Thinking</button>
            </div>
            <button type="button" data-open-view="map">Map</button>
            <button type="button" data-open-view="gallery">Gallery</button>
            <button type="button" data-command="/help">Help</button>
          </div>
        </aside>

        <section class="terminal-pane">
          <div id="transcript" class="transcript" aria-live="polite"></div>
          <form id="promptForm" class="prompt" autocomplete="off">
            <label for="promptInput">&gt;</label>
            <input
              id="promptInput"
              name="prompt"
              type="text"
              spellcheck="false"
              autocomplete="off"
              placeholder="Ask about events, type more, or use /city boston"
            >
            <button type="submit">Send</button>
          </form>
        </section>
      </section>
    </main>

    <script type="module" src="__TWAG_TERMINAL_APP_URL__"></script>
  </body>
</html>
